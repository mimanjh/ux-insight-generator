name: Deploy to Fly.io

on:
  push:
    branches: [main]
  # Lets you trigger a deploy manually from the GitHub Actions UI without
  # needing to push a commit.
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # Prevents two deploys from racing each other if commits land quickly.
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        # --remote-only builds the image on Fly's builder VM, not on the
        # GitHub runner. Saves runner time and skips needing a container
        # registry of our own.
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
